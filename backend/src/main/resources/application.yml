spring:
  application:
    name: library-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB:library_db}
    username: ${POSTGRES_USER:library_user}
    password: ${POSTGRES_PASSWORD:library_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-key-must-be-at-least-256-bits!!}
    access-token-expiration-ms: 900000      # 15 minutes
    refresh-token-expiration-ms: 604800000  # 7 days
  borrow:
    max-books-per-user: 5
    default-due-days: 14
